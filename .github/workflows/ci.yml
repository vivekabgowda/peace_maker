name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" asyncpg
      - name: Ruff (lint)
        run: ruff check app tests scripts
      - name: Black (format check)
        run: black --check app tests scripts migrations
      - name: MyPy (types)
        run: mypy app
      - name: Pytest (with coverage)
        run: pytest

  backend-postgres:
    name: Backend — Postgres + TimescaleDB integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: bkn
          POSTGRES_PASSWORD: bkn
          POSTGRES_DB: bkn_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bkn -d bkn_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      BKN_ENV: test
      BKN_DATABASE_URL: postgresql+asyncpg://bkn:bkn@localhost:5432/bkn_test
      BKN_REDIS_URL: redis://localhost:6379/0
      BKN_JWT_SECRET_KEY: test-secret-key-not-for-production
      BKN_TEST_FAKE_REDIS: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" asyncpg
      - name: Migration-apply test (alembic upgrade head on real Postgres+Timescale)
        run: alembic upgrade head && alembic downgrade base && alembic upgrade head
      - name: Pytest against Postgres + real Redis
        run: pytest -q

  frontend:
    name: Frontend — lint, type, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prettier (format check)
        run: npx prettier --check .
      - name: ESLint
        run: npm run lint -- --max-warnings 0
      - name: TypeScript
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  docker:
    name: Docker — build images (no push)
    runs-on: ubuntu-latest
    needs: [backend, backend-postgres, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: bkn-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: bkn-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
