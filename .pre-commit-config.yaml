# Pre-commit hooks. Install once with:  pip install pre-commit && pre-commit install
# Runs the same quality gates as CI, locally, before each commit.
minimum_pre_commit_version: '3.5.0'
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # ---- Backend (Python) ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies: [pydantic>=2.9]
        args: [--config-file, backend/pyproject.toml]

  # ---- Frontend (Node) ----
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend eslint + prettier
        entry: bash -c 'cd frontend && npx prettier --check . && npx next lint --max-warnings 0'
        language: system
        files: ^frontend/
        pass_filenames: false
