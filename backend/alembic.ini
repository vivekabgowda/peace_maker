# Alembic configuration for BKN AI Capital.
# The database URL is injected at runtime from application settings
# (see migrations/env.py), so it is intentionally left blank here.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
# sqlalchemy.url is set programmatically in env.py

[post_write_hooks]
hooks = black,ruff
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
