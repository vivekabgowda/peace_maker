# ---------------------------------------------------------------------------
# BKN AI Capital — development stack.
# Brings up the full app locally: Postgres (+TimescaleDB), Redis, backend
# (with hot reload), frontend, and n8n. `make up` wraps this file.
# ---------------------------------------------------------------------------
name: bkn-dev

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: ${BKN_DB_USER:-bkn}
      POSTGRES_PASSWORD: ${BKN_DB_PASSWORD:-bkn}
      POSTGRES_DB: ${BKN_DB_NAME:-bkn}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${BKN_DB_USER:-bkn} -d ${BKN_DB_NAME:-bkn}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: builder
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      BKN_ENV: local
      BKN_DEBUG: 'true'
      BKN_LOG_JSON: 'false'
      BKN_DATABASE_URL: postgresql+asyncpg://${BKN_DB_USER:-bkn}:${BKN_DB_PASSWORD:-bkn}@postgres:5432/${BKN_DB_NAME:-bkn}
      BKN_REDIS_URL: redis://redis:6379/0
      BKN_JWT_SECRET_KEY: ${BKN_JWT_SECRET_KEY:-dev-secret-change-me-1234567890}
      BKN_CORS_ORIGINS: http://localhost:3000
      # The API consumes market events for WebSocket fan-out but NEVER ingests —
      # ingestion runs in the dedicated `feed` service (R0 #1).
      BKN_EVENT_STREAM_ENABLED: 'true'
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Dedicated market feed service (single-instance ingestion; never the API).
  feed:
    build:
      context: ./backend
      target: builder
    command: python -m app.feed
    environment:
      BKN_ENV: local
      BKN_LOG_JSON: 'false'
      BKN_DATABASE_URL: postgresql+asyncpg://${BKN_DB_USER:-bkn}:${BKN_DB_PASSWORD:-bkn}@postgres:5432/${BKN_DB_NAME:-bkn}
      BKN_REDIS_URL: redis://redis:6379/0
      BKN_JWT_SECRET_KEY: ${BKN_JWT_SECRET_KEY:-dev-secret-change-me-1234567890}
      BKN_MARKET_PROVIDER: ${BKN_MARKET_PROVIDER:-simulated}
      BKN_MARKET_TICK_INTERVAL: '1.0'
      BKN_EVENT_STREAM_ENABLED: 'true'
      # Sprint 7 — paper trading + automatic performance reports run in the feed.
      BKN_PAPER_TRADING_ENABLED: 'true'
      BKN_REPORT_SCHEDULER_ENABLED: 'true'
      # Broker (Sprint 6) — only used when BKN_MARKET_PROVIDER=zerodha.
      BKN_ZERODHA_API_KEY: ${BKN_ZERODHA_API_KEY:-}
      BKN_ZERODHA_API_SECRET: ${BKN_ZERODHA_API_SECRET:-}
      BKN_BROKER_ENC_KEY: ${BKN_BROKER_ENC_KEY:-}
    volumes:
      - ./backend:/app
    ports:
      - '8001:8001'
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health/live').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: deps
    command: sh -c "npm run dev"
    working_dir: /app
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_TELEMETRY_DISABLED: '1'
      # Browser connects to the backend WebSocket directly in dev.
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      backend:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_PORT: 5678
      GENERIC_TIMEZONE: Asia/Kolkata
    ports:
      - '5678:5678'
    volumes:
      - n8n_data:/home/node/.n8n
      - ./automation/n8n/workflows:/workflows:ro

volumes:
  pg_data:
  redis_data:
  n8n_data:
