# ---------------------------------------------------------------------------
# BKN AI Capital — production stack (Hostinger VPS).
# Nginx terminates TLS and is the only public entry point. Postgres and Redis
# are NOT published to the host — they are reachable only on the internal
# network. Images are pulled by tag; configuration comes from the VPS .env.
#
# Usage on the VPS:
#   docker compose -f infra/compose/docker-compose.prod.yml --env-file .env up -d
# ---------------------------------------------------------------------------
name: bkn-prod

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: always
    environment:
      POSTGRES_USER: ${BKN_DB_USER}
      POSTGRES_PASSWORD: ${BKN_DB_PASSWORD}
      POSTGRES_DB: ${BKN_DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${BKN_DB_USER} -d ${BKN_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: always
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${BKN_REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${BKN_REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [internal]

  migrate:
    image: ${BKN_BACKEND_IMAGE:-bkn-backend:latest}
    command: ['alembic', 'upgrade', 'head']
    environment:
      BKN_ENV: production
      BKN_DATABASE_URL: postgresql+asyncpg://${BKN_DB_USER}:${BKN_DB_PASSWORD}@postgres:5432/${BKN_DB_NAME}
      BKN_JWT_SECRET_KEY: ${BKN_JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    networks: [internal]

  backend:
    image: ${BKN_BACKEND_IMAGE:-bkn-backend:latest}
    restart: always
    environment:
      BKN_ENV: production
      BKN_LOG_JSON: 'true'
      BKN_DATABASE_URL: postgresql+asyncpg://${BKN_DB_USER}:${BKN_DB_PASSWORD}@postgres:5432/${BKN_DB_NAME}
      BKN_REDIS_URL: redis://:${BKN_REDIS_PASSWORD}@redis:6379/0
      BKN_JWT_SECRET_KEY: ${BKN_JWT_SECRET_KEY}
      BKN_CORS_ORIGINS: ${BKN_CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  frontend:
    image: ${BKN_FRONTEND_IMAGE:-bkn-frontend:latest}
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks: [internal]

volumes:
  pg_data:
  redis_data:
  certbot_webroot:

networks:
  internal:
    driver: bridge
