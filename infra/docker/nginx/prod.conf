# ---------------------------------------------------------------------------
# BKN AI Capital — production Nginx (Hostinger VPS).
# Single public entry point: terminates TLS, proxies to the frontend and
# backend, upgrades the WebSocket route, and sets security headers.
# Replace `bkn.example.com` with the real domain before issuing certificates.
# ---------------------------------------------------------------------------

upstream bkn_backend {
    server backend:8000;
}
upstream bkn_frontend {
    server frontend:3000;
}

# Gzip
gzip on;
gzip_types text/plain text/css application/json application/javascript application/xml;
gzip_min_length 1024;

# --- HTTP :80 — ACME challenge + redirect to HTTPS -------------------------
server {
    listen 80;
    server_name bkn.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 ------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name bkn.example.com;

    # SSL — certificates provisioned by Certbot (Let's Encrypt), auto-renewed.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;
    proxy_read_timeout 60s;

    # WebSocket route (live quotes, recommendations — later sprints).
    location /api/v1/ws {
        proxy_pass http://bkn_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # REST API
    location /api/ {
        proxy_pass http://bkn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Metrics — restrict to the internal network (scraped by Prometheus).
    location /metrics {
        proxy_pass http://bkn_backend;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://bkn_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
